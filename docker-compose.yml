services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-photoshoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ai_photoshoot
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_photoshoot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
